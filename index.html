<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday Bobo! 🎂</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  }
  .emoji { font-size: 3em; margin-bottom: 10px; }
  h1 { font-size: 2em; color: #e0457b; margin-bottom: 8px; }
  p  { color: #777; font-size: 1em; margin-bottom: 24px; line-height: 1.6; }
  textarea {
    width: 100%;
    height: 110px;
    font-size: 1em;
    border: 2px solid #f7a8c4;
    border-radius: 12px;
    padding: 12px;
    resize: none;
    outline: none;
    transition: border 0.2s;
  }
  textarea:focus { border-color: #e0457b; }
  button {
    margin-top: 16px;
    width: 100%;
    background: #e0457b;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 1.1em;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #c0356b; }
  button:disabled { background: #f0a0c0; cursor: not-allowed; }
  #status {
    margin-top: 16px;
    font-size: 0.95em;
    min-height: 24px;
    color: #555;
  }
  .success { color: #2ecc71 !important; font-weight: bold; }
  .error   { color: #e74c3c !important; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🎂</div>
  <h1>Happy Birthday Bobo!</h1>
  <p>Type a birthday wish below — it'll magically appear on a special display just for you! 🎉</p>
  <textarea id="msg" placeholder="Write your birthday wish here..."></textarea>
  <button id="btn" onclick="sendMsg()">Send Wish 💌</button>
  <div id="status"></div>
</div>

<script>
  const ESP_URL = "https://pavestone-spiral-divisibly.ngrok-free.dev";

  async function sendMsg() {
    const msg = document.getElementById("msg").value.trim();
    const btn = document.getElementById("btn");
    const status = document.getElementById("status");

    if (!msg) {
      status.className = "error";
      status.innerText = "Please write something first!";
      return;
    }

    btn.disabled = true;
    status.className = "";
    status.innerText = "Sending your wish... ✉️";

    try {
      const res = await fetch(ESP_URL + "/message", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "msg=" + encodeURIComponent(msg)
      });

      if (res.ok) {
        status.className = "success";
        status.innerText = "🎉 Wish delivered! Check the display!";
        btn.innerText = "Sent!";
      } else {
        throw new Error("Bad response");
      }
    } catch (e) {
      status.className = "error";
      status.innerText = "Could not reach the display. Is everything on?";
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
